        Plugin 启动检查 key 状态时调用；开发者中心页面加载时调用。

        **鉴权**：已登录（cookie 或 developer api key 均可——开发者本人可用 key 自查）。
      operationId: getMyDeveloper
      security:
        - minusAiSid: []
        - developerApiKey: []
      responses:
        '200':
          description: 当前用户的开发者资质
          content:
            application/json:
              schema:
                type: object
                required: &ref_49
                  - status
                properties: &ref_50
                  status:
                    type: string
                    enum:
                      - PENDING
                      - VERIFIED
                      - SUSPENDED
                      - REVOKED
                    description: 开发者资质状态。表无行的用户走 404 NOT_DEVELOPER，不出现在响应里
                    example: VERIFIED
                  verifiedAt:
                    type: integer
                    format: int64
                    description: 首次置 VERIFIED 时间戳（毫秒）；未达到 VERIFIED 时省略
                    example: 1716000000000
                  suspendedReason:
                    type: string
                    maxLength: 500
                    description: admin 改 SUSPENDED / REVOKED 时填写的原因；仅这两个状态返回
                  apiKey:
