    post:
      tags:
        - Developer
      summary: 自助生成 API Key
      description: |
        `POST /api/me/developer/api-key`

        要求当前 `status='VERIFIED'` 且当前**无 key**（已存在 → 409 `KEY_EXISTS`）。
        生成新 key → UPDATE `user_developers` 写入 `api_key_hash` + `api_key_prefix`。
        **原文仅此一次返回**，不入库。

        **鉴权**：仅 cookie session。dev key 自己不允许生成新 key（避免被盗 key 用于轮换攻击）。
      operationId: createMyApiKey
