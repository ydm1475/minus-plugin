openapi: 3.1.0
info:
  title: Web端 Rest API
  version: 1.0.0
  description: |
    ## 认证

    Web 端请求通过 Cookie `MINUS_AI_SID` 鉴权（**Spring Session + Redis**，opaque session token，非 JWT）。

    - 注册 / 登录成功后，平台 Set-Cookie 下发 `MINUS_AI_SID=<sessionId>`（HttpOnly、SameSite=Lax、prod 下 Secure）
    - 后续请求浏览器自动带 cookie，gateway 通过 `ReactiveSessionRepository.findById(sessionId)` 校验 → 命中后注入 `X-User-Id` + `X-Team-Id` 头给下游
    - session 默认 7 天滑动过期；登录时带 `rememberMe=true` 延长至 30 天
    - session 失效 / 不存在 → 业务接口返 `401 UNAUTHORIZED`；前端清状态跳登录页
    - `/api/auth/**` 与 `/oauth/**` 在 gateway 白名单内（不要求 session 即可访问）

    **第三方 skill 开发者本地调试场景**通过 OAuth 2.0 Authorization Code + PKCE 拿到 `MINUS_AI_SID`，详见 **OAuth** tag 下的两个端点。

    **手机号必绑约束**：邮箱注册的账户已登录但未绑手机号时，所有业务接口返 `403 PHONE_REQUIRED`；仅以下接口允许调用以完成绑定流程：`GET /api/me`（读自己状态，含 `phoneRequired` 字段）、`/api/auth/logout`、`/api/auth/identities/bind`、`/api/auth/vcode/send`（purpose=bind）、`/api/auth/password/change`。注意 `PATCH /api/me`（改 profile）**不在白名单**——必须先绑定手机号才能修改资料。
servers:
  - url: /
    description: 本地联调（自动跟随当前 docs 页面的 host，浏览器访问哪个就调哪个）
  - url: https://dev.sif.com
    description: 开发环境
  - url: https://www.sif.com
    description: 生产环境
security:
  - minusAiSid: []
tags:
  - name: OAuth
    description: |
      ## OAuth 2.0 Authorization Code + PKCE

      平台对外暴露的 OAuth 2.0 端点。1.0 阶段服务对象 = **第三方 skill 开发者本地调试**，未来可平滑扩展为"第三方应用用 minusai 账号登录"的 OAuth Provider（加 scope / consent / refresh_token / OIDC `id_token` 即可）。

      ### 4 角色映射（与 [RFC 6749 §1.1](https://datatracker.ietf.org/doc/html/rfc6749#section-1.1) 对齐）

      | OAuth 标准 | 本平台实体 | 凭证 / 标识 |
      |---|---|---|
      | Resource Owner | 开发者本人 | dev 域 `MINUS_AI_SID` cookie |
      | User Agent | 浏览器 | 仅 redirect 中介，**不持有任何 token** |
      | Client | SDK（开发者本机跑的 skill 后端） | `client_id` = `skills.id`（`skl_xxx`）<br>`client_secret` = `skills.api_key`（`ska_xxx`） |
      | Authorization Server | 本平台（`minusai-dev.com`） | 自身 |
      | Resource Server | `/skill-api/**` | 验 `MINUS_AI_SID` + `X-Skill-Api-Key` |

      **关键**：`client_id` / `client_secret` 直接复用 skill 创建时已发的 `skill_id` / `skill_api_key`——**1 个 skill = 1 个 OAuth client**，无独立注册流程。

      ### 错误响应格式（**与本文档其他 endpoint 不同**）

      OAuth endpoint 严格遵循 [RFC 6749 §5.2](https://datatracker.ietf.org/doc/html/rfc6749#section-5.2)：

      ```json
      {
        "error": "invalid_grant",
        "error_description": "authorization code has expired or already been used"
      }
      ```

      | `error` | HTTP | 用途 |
      |---|---|---|
      | `invalid_request` | 400 | 缺必填参数 / 参数格式错（如 `code_challenge_method` 非 `S256`） |
      | `invalid_client` | 401 | `client_id` 不存在 / `client_secret` 与 `skills.api_key` 不匹配 / skill `status != active` |
      | `invalid_grant` | 400 | `code` 不存在 / 过期 / 已消费 / `redirect_uri` 与 code 绑定的不一致 / PKCE 校验失败 |
      | `unsupported_grant_type` | 400 | `grant_type` 非 `authorization_code`（1.0 仅支持此一种） |
      | `unsupported_response_type` | 400 | `response_type` 非 `code` |
      | `server_error` | 500 | 内部错误（Redis 抖动等） |

      ### `/oauth/authorize` 错误的双分支处理（RFC 6749 §4.1.2.1）

      - **不可 redirect 的错误**（`client_id` 不存在 / `redirect_uri` 缺失或不在白名单）→ 平台直接渲染错误页 + HTTP 400，**禁止回跳 `redirect_uri`**（否则攻击者可构造任意跳转）
      - **可 redirect 的错误**（其他参数错）→ 302 回 `redirect_uri` 带 `?error=...&error_description=...&state=...`

      ### redirect_uri 白名单（1.0 配置数组）

      | 模式 | 用途 |
      |---|---|
      | `http://localhost(:\d+)?(/.*)?` | 第三方 skill 开发者本机 dev server |
      | `https://*.minusai-dev.com(/.*)?` | dev 平台部署的 skill 容器 |

      **匹配方式**：解析 URL 后**分别比较** `scheme + host + port`，path 段独立验证 —— **严禁字符串子串 / `startsWith` 匹配**（否则 `http://attacker.com/?localhost=` 可绕过）。

      **gateway 白名单**：`/oauth/**` 与 `/api/auth/**` 一同放行（不要求 session）。
  - name: Auth
    description: 注册 / 登录 / 登出 / 验证码 / 密码 / identity 绑定
  - name: Profile
    description: 当前用户资料读写（昵称 / 头像 / 语言 / 时区）
  - name: Skill
    description: Skill 列表、关联推荐、创建及 endpoint 管理
  - name: SkillTag
    description: Skill 标签字典（开发者查询 + admin 后台 CRUD）
  - name: Session
    description: Session 创建、查询与删除
  - name: File
    description: 文件上传、下载与删除
  - name: Errors
    description: |
      ## 错误响应格式

      所有错误响应均使用统一结构：

      ```json
      {
        "code": "NOT_FOUND",
        "message": "Resource not found",
        "details": {}
      }
      ```

      | 字段 | 类型 | 必填 | 说明 |
      |------|------|------|------|
      | `code` | string | ✓ | 错误码，全大写下划线格式 |
      | `message` | string | ✓ | 人类可读的错误描述 |
      | `details` | object | — | 附加上下文，结构因错误类型而异 |

      ---

      ## 错误码

      > HTTP 状态码 → `code` 是一对多；`code` → HTTP 状态码 是一对一。
      >
      > **调用方处理逻辑**：优先看 `code` 做精细处理（`QUOTA_EXCEEDED` → 弹升级套餐引导；`FILE_TOO_LARGE` → 提示文件大小限制；`CONFLICT` → 提示「任务运行中，请等待完成后操作」）；`code` 不可用时（网络超时、Nginx 502/504 等基础设施层错误导致响应体非 JSON）降级看 HTTP 状态码兜底（`401` → 清除 token 跳登录页；`403` → 提示权限不足；`5xx` → 通用报错并上报日志）。

      | HTTP 状态码 | `code` | 说明 |
      |------------|--------|------|
      | 400 | `FILE_TOO_LARGE` | 上传文件超过大小限制 |
      | 400 | `UNSUPPORTED_FORMAT` | 文件格式不在允许列表（如上传了 .exe） |
      | 400 | `VALIDATION_ERROR` | 请求参数缺失或格式错误（如 `entryParams` 非 JSON 对象） |
      | 400 | `VCODE_INVALID` | 验证码错误（输入与 Redis 中存储的值不匹配） |
      | 400 | `VCODE_EXPIRED` | 验证码已过期或不存在（10 分钟 TTL 已过 / 已被消费） |
      | 401 | `UNAUTHORIZED` | `MINUS_AI_SID` Cookie 缺失、过期或无效，需重新登录 |
      | 401 | `PASSWORD_INCORRECT` | 密码登录时密码不匹配 |
      | 403 | `FORBIDDEN` | 当前用户无操作权限（如非 admin 调用 `/api/skills` 写接口） |
      | 403 | `ACCOUNT_LOCKED` | 账户因连续登录失败被临时锁定（15 分钟） |
      | 403 | `PHONE_REQUIRED` | 已登录账户尚未绑定手机号，需先调 `/api/auth/identities/bind` 绑定 |
      | 404 | `NOT_FOUND` | Session / 文件不存在，或不属于当前用户（统一 404，不暴露资源存在性） |
      | 404 | `IDENTITY_NOT_FOUND` | 登录时 identifier（手机/邮箱）未注册 |
      | 409 | `CONFLICT` | Session 正在运行中，不允许删除（需等待 pipeline 完成或 error） |
      | 409 | `NO_CURRENT_VERSION` | 调用默认版本 endpoint 接口时 `current_version_id` 为空（skill 尚未发布首版本） |
      | 409 | `IDENTITY_TAKEN` | 注册或绑定时手机号/邮箱已被其他账户占用 |
      | 429 | `QUOTA_EXCEEDED` | 月度 skill 执行次数、存储空间或数据 API 调用次数超出套餐上限 |
      | 429 | `RATE_LIMITED` | 短时间内对同一接口请求过于频繁（含验证码 60s 冷却 / 24h 配额、登录失败 IP 限频等） |
      | 500 | `INTERNAL_ERROR` | 服务器内部错误，请稍后重试或联系平台 |

      ---

      ## OAuth 2.0 endpoint 例外

      `/oauth/authorize` 与 `/oauth/token` 走 [RFC 6749 §5.2](https://datatracker.ietf.org/doc/html/rfc6749#section-5.2) 标准错误格式 `{ "error": "invalid_grant", "error_description": "...", "error_uri": "..." }`（全小写 snake_case），**不**走本节的 `{ code, message, details }` 格式——让标准 OAuth client lib 开箱兼容、未来扩展第三方 OIDC provider 时无需做兼容层。OAuth 错误码集合：`invalid_request` / `invalid_client` / `invalid_grant` / `unsupported_grant_type` / `unsupported_response_type` / `server_error`，详见 **OAuth** tag。
paths:
  /api/auth/vcode/send:
    post:
      tags:
        - Auth
      summary: 发送验证码
      description: |
        `POST /api/auth/vcode/send`

        服务端按 `(channel, target)` 生成 6 位数字验证码，写入 Redis `auth:vcode:{channel}:{value}`（TTL 10 分钟，GETDEL 一次性消费）。同时校验冷却（`auth:vcode:send:{channel}:{value}` 60s）和 24h 配额（`auth:vcode:daily:{channel}:{value}` ≤10 次）。dev profile 验证码固定 `888888` 且只打日志不真发；prod profile 调 SMS / Email provider 真发。

        **公开接口**（无需 session）。
      operationId: sendVcode
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: &ref_28
                - channel
                - target
                - purpose
              properties: &ref_29
                channel:
                  type: string
                  enum:
                    - phone
                    - email
                  description: 验证码下发渠道
                  example: phone
                target:
                  type: string
                  description: channel=phone 时为 E.164 格式手机号；channel=email 时为邮箱地址。服务端用 libphonenumber 校验手机号合法性
                  example: '+8613800000000'
                purpose:
                  type: string
                  enum:
                    - register
                    - login
                    - reset
                    - bind
                  description: 用途；服务端按 purpose 决定文案，**不**校验"用户是否已存在"——避免暴露注册状态做枚举攻击
                  example: register
      responses:
        '204':
          description: 已发送（或 dev profile 已写入 Redis）
        '400':
          description: 请求参数错误，`code` 可为 `FILE_TOO_LARGE` / `UNSUPPORTED_FORMAT` / `VALIDATION_ERROR`
          content: &ref_2
            application/json:
              schema:
                type: object
                required: &ref_0
                  - code
                  - message
                properties: &ref_1
                  code:
                    type: string
                    description: 错误码，全大写下划线格式
                    example: NOT_FOUND
                  message:
                    type: string
                    description: 人类可读的错误描述
                    example: Resource not found
                  details:
                    type:
                      - object
                      - 'null'
                    description: 附加上下文，结构因错误类型而异；无附加上下文时为 null
              example:
                code: FILE_TOO_LARGE
                message: File size exceeds limit
        '429':
          description: 请求频率过快（短时间请求过多），`code` 为 `RATE_LIMITED`
          content: &ref_3
            application/json:
              schema:
                type: object
                required: *ref_0
                properties: *ref_1
              example:
                code: RATE_LIMITED
                message: Too many requests, please retry later
  /api/auth/register:
    post:
      tags:
        - Auth
      summary: 注册（注册即登录）
      description: |
        `POST /api/auth/register`

        消费验证码后，事务内 INSERT users + user_identities + teams（is_personal=true）+ team_members（role=owner），同时建立 Spring Session 并下发 cookie。注册即登录，前端不需再调 login。

        **公开接口**（无需 session）。
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: &ref_30
                - channel
                - target
                - code
              properties: &ref_31
                channel:
                  type: string
                  enum:
                    - phone
                    - email
                  description: 注册通道
                  example: phone
                target:
                  type: string
                  description: 手机号（E.164） / 邮箱
                  example: '+8613800000000'
                code:
                  type: string
                  description: 6 位数字验证码
                  example: '888888'
                password:
                  type: string
                  minLength: 8
                  description: 注册即设密码；不传则账户为"仅验证码登录"模式（`users.password_hash=NULL`）
                  example: Qwer1234
      responses:
        '200':
          description: |
            注册成功；响应 header 含 `Set-Cookie MINUS_AI_SID=<sessionId>`
          headers:
            Set-Cookie:
              description: 下发 session cookie
              schema:
                type: string
                example: MINUS_AI_SID=abc123...; Path=/; HttpOnly; SameSite=Lax
          content:
            application/json:
              schema:
                type: object
                required: &ref_32
                  - userId
                  - personalTeamId
                properties: &ref_33
                  userId:
                    type: string
                    description: 新创建的用户 ID
                    example: usr_5k8Zt7QhZ3kR9mVx2yNpEw
                  personalTeamId:
                    type: string
                    description: 自动建立的 personal team ID（同事务建好的 owner 工作区）
                    example: tm_5k8Zt7QhZ3kR9mVx2yNpEw
        '400':
          description: 请求参数错误，`code` 可为 `FILE_TOO_LARGE` / `UNSUPPORTED_FORMAT` / `VALIDATION_ERROR`
          content: *ref_2
        '409':
          description: 注册或绑定时手机号/邮箱已被其他账户占用（不暴露具体属于谁）
          content: &ref_5
            application/json:
              schema:
                type: object
                required: *ref_0
                properties: *ref_1
              example:
                code: IDENTITY_TAKEN
                message: This phone or email is already registered
                details:
                  channel: phone
                  target: '+8613800000000'
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: 登录
      description: |
        `POST /api/auth/login`

        按 `grantType` 校验凭证（密码 / 验证码），通过后建立 Spring Session 并下发 cookie。session 中 `currentTeamId` 取自 `users.last_team_id`（如果该 team 已不在 team_members 中——比如被踢——回退到 personal team）。

        **公开接口**（无需 session）。
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: &ref_34
                - grantType
                - identifier
                - credential
              properties: &ref_35
                grantType:
                  type: string
                  enum:
                    - phone_password
                    - email_password
                    - phone_code
                    - email_code
                  description: 登录授权类型
                  example: phone_code
                identifier:
                  type: string
                  description: 手机号（E.164） / 邮箱
                  example: '+8613800000000'
                credential:
                  type: string
                  description: 密码明文（`*_password` 模式）/ 6 位验证码（`*_code` 模式）
                  example: '888888'
                rememberMe:
                  type: boolean
                  default: false
                  description: 默认 false；true 时 session TTL 延长至 30 天，cookie 附 Max-Age=2592000
                  example: false
      responses:
        '200':
          description: |
            登录成功；响应 header 含 `Set-Cookie MINUS_AI_SID=<sessionId>`，`rememberMe=true` 时附 `Max-Age=2592000`
          headers:
            Set-Cookie:
              description: 下发 session cookie
              schema:
                type: string
                example: MINUS_AI_SID=abc123...; Path=/; HttpOnly; SameSite=Lax
          content:
            application/json:
              schema:
                type: object
                required: &ref_36
                  - userId
                  - currentTeamId
                properties: &ref_37
                  userId:
                    type: string
                    description: 用户 ID
                    example: usr_5k8Zt7QhZ3kR9mVx2yNpEw
                  currentTeamId:
                    type: string
                    description: 本次 session 当前活跃 team ID（取自 `users.last_team_id`，失效则回退 personal team）
                    example: tm_5k8Zt7QhZ3kR9mVx2yNpEw
        '400':
          description: 请求参数错误，`code` 可为 `FILE_TOO_LARGE` / `UNSUPPORTED_FORMAT` / `VALIDATION_ERROR`
          content: *ref_2
        '401':
          description: 密码错误（`PASSWORD_INCORRECT`）或 session 缺失（`UNAUTHORIZED`）
          content:
            application/json:
              schema:
                type: object
                required: *ref_0
                properties: *ref_1
              example:
                code: PASSWORD_INCORRECT
                message: Password is incorrect
        '403':
          description: 账户被锁定（`ACCOUNT_LOCKED`）/ banned（`FORBIDDEN`）
          content:
            application/json:
              schema:
                type: object
                required: *ref_0
                properties: *ref_1
              example:
                code: ACCOUNT_LOCKED
                message: Account locked due to too many failed attempts
                details:
                  unlockAtMs: 1778000000000
        '404':
          description: identifier 未注册（`IDENTITY_NOT_FOUND`）
          content:
            application/json:
              schema:
                type: object
                required: *ref_0
                properties: *ref_1
              example:
                code: IDENTITY_NOT_FOUND
                message: No account registered with this identifier
        '429':
          description: 请求频率过快（短时间请求过多），`code` 为 `RATE_LIMITED`
          content: *ref_3
  /api/auth/logout:
    post:
      tags:
        - Auth
      summary: 登出
      description: |
        `POST /api/auth/logout`

        清空 Spring Session、清空 cookie、从 `auth:user:sessions:{userId}` RSet 移除当前 sessionId。无 session 时也容忍，幂等返回 204。手机号未绑定的账户也允许调用。
      operationId: logout
      responses:
        '204':
          description: |
            已登出；响应 header 含 `Set-Cookie MINUS_AI_SID=` 与 `Max-Age=0`
          headers:
            Set-Cookie:
              description: 清空浏览器 cookie
              schema:
                type: string
                example: MINUS_AI_SID=; Path=/; Max-Age=0
  /api/me:
    get:
      tags:
        - Profile
      summary: 获取当前用户信息
      description: |
        `GET /api/me`

        读 session 中 `userId` + `currentTeamId`，JOIN 出完整用户资料 + 当前 team 信息 + 已绑定的 identities 列表。`avatarUrl` 由 service 层 JOIN files 表拼出真实 URL（`{cdn_base}/{storage_bucket}/{storage_key}`），前端不感知 file_id。

        **手机号未绑定时也可调用**——前端从此接口的 `phoneRequired` 字段获知绑定状态、引导用户跳绑定页面。
      operationId: getMe
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: &ref_38
                  - userId
                  - nickname
                  - locale
                  - timezone
                  - status
                  - phoneRequired
                  - identities
                  - currentTeam
                properties: &ref_39
                  userId:
                    type: string
                    description: 用户 ID
                    example: usr_5k8Zt7QhZ3kR9mVx2yNpEw
                  nickname:
                    type: string
                    description: 显示昵称（注册时按规则自动生成，用户可改）
                    example: 用户8000
                  avatarFileId:
                    type: string
                    description: 头像 file ID；avatar_file_id=NULL 时此字段省略
                    example: file_5k8Zt7QhZ3kR9mVx2yNpEw
                  avatarUrl:
                    type: string
                    format: uri
                    description: 头像完整 URL（service 层 JOIN files 拼出）；avatar_file_id=NULL 时此字段省略，前端按 nickname 首字母渲染默认 letter avatar
                    example: https://cdn.sif.com/user-avatar/2026/05/usr_xxx.png
                  primaryPhone:
                    type: string
                    description: E.164 格式手机号；未绑定时省略
                    example: '+8613800000000'
                  primaryEmail:
                    type: string
                    format: email
                    description: 邮箱；未绑定时省略
                    example: foo@bar.com
                  locale:
                    type: string
                    enum:
                      - zh-CN
                      - en-US
                      - ja-JP
                    description: 用户语言偏好
                    example: zh-CN
                  timezone:
                    type: string
                    description: IANA 时区
