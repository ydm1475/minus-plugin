      responses:
        '200':
          description: 新颁发的 API Key（原文）
          content:
            application/json:
              schema:
                type: object
                required: *ref_5
                properties: *ref_6
        '401':
          description: MINUS_AI_SID Cookie 缺失、过期或无效，需重新登录
          content: *ref_4
        '403':
          description: 当前 user 不在 admin 白名单
          content:
            application/json:
              schema:
                type: object
                required: *ref_0
                properties: *ref_1
              example:
                code: FORBIDDEN
        '404':
          description: user_developers 无对应行
          content:
            application/json:
              schema:
                type: object
                required: *ref_0
                properties: *ref_1
              example:
                code: NOT_DEVELOPER
        '409':
          description: 状态非 VERIFIED
          content:
            application/json:
