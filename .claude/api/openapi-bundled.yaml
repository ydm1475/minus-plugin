        不管当前 `api_key_hash` 是否为 NULL，**强制生成新 key**：
        UPDATE `api_key_hash` / `api_key_prefix` → 同步 `redisson.delete` 清旧 key 缓存。

        **使用场景**：开发者 key 丢失代操作 / key 泄漏立即轮换 / SUSPENDED 恢复时刷新 key。

        **鉴权**：admin 白名单。
      operationId: adminRegenerateDeveloperApiKey
