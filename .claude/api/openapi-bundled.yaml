      description: |
        `POST /api/skills`

        任意登录用户自助创建 skill。系统强制首版本 `version='1.0-alpha.1'` + `status='draft'`;`skills.current_version_id=NULL`(未上架前),`current_draft_version_id` 指向新草稿。`apiKey` 仅响应里返一次。完整生命周期见 [skill-version-lifecycle.md](../../../docs/1.0/skill-version-lifecycle.md)。
      operationId: createSkill
