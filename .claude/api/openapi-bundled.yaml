        OAuth 错误响应（[RFC 6749 §5.2](https://datatracker.ietf.org/doc/html/rfc6749#section-5.2)），格式 `{ error, error_description, error_uri }`。
        **与项目其他接口的 ErrorResponse 不同**——OAuth endpoint 唯一例外，让标准 OAuth client lib 开箱兼容。
      properties: *ref_25
  responses:
    Unauthorized:
      description: MINUS_AI_SID Cookie 缺失、过期或无效，需重新登录
      content: *ref_4
    PhoneRequired:
      description: 已登录账户尚未绑定手机号；前端引导用户跳"绑定手机号"页面
      content: *ref_116
    IdentityTaken:
      description: 注册或绑定时手机号/邮箱已被其他账户占用（不暴露具体属于谁）
      content: *ref_7
    Forbidden:
      description: 当前用户无操作权限（如非 admin 调用 `/api/skills` 写接口）
      content: *ref_15
    BadRequest:
      description: 请求参数错误，`code` 可为 `FILE_TOO_LARGE` / `UNSUPPORTED_FORMAT` / `VALIDATION_ERROR`
      content: *ref_2
    NotFound:
      description: 资源不存在或无权访问
      content: *ref_10
    Conflict:
      description: |
        资源状态冲突,无法执行操作。`code` 可为:
        `CONFLICT` (session 运行中不可删) /
        `NO_PUBLISHED_BASE` (草稿升级要求该 skill 有 PUBLISHED 行) /
        `ACTIVE_DRAFT_EXISTS` (该 skill 已存在活跃行) /
        `NOT_EDITABLE` / `NOT_DELETABLE` / `NOT_SUBMITTABLE` /
        `NOT_RELEASABLE` / `NOT_APPROVABLE` / `NOT_REJECTABLE` / `NOT_DISABLABLE` (状态机不允许此动作)
      content: *ref_21
    ForbiddenAuthMethod:
      description: 当前凭据类型不允许调用此接口(如 dev key 调 admin 审核接口必须 cookie session)
      content:
        application/json:
          schema:
            type: object
            required: *ref_0
            properties: *ref_1
          example:
            code: FORBIDDEN_AUTH_METHOD
            message: This endpoint requires cookie session authentication
    QuotaExceeded:
      description: 套餐额度耗尽（月度/总量限制），`code` 为 `QUOTA_EXCEEDED`
      content:
        application/json:
          schema:
            type: object
            required: *ref_0
            properties: *ref_1
          example:
            code: QUOTA_EXCEEDED
            message: Plan quota exceeded
    RateLimited:
      description: 请求频率过快（短时间请求过多），`code` 为 `RATE_LIMITED`
      content: *ref_3
    InternalError:
      description: 服务器内部错误
      content:
        application/json:
          schema:
            type: object
            required: *ref_0
            properties: *ref_1
          example:
            code: INTERNAL_ERROR
            message: Internal server error
