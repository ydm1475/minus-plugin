                            description: 完整 key 的前 12 字符（`mdk_` + 8 位随机），UI 展示 `mdk_5k8Zt7Q...••••` 让用户识别哪把 key，不是 secret
                            example: mdk_5k8Zt7Qh
                      - type: 'null'
                    description: |
                      当前 API Key 的展示信息。未颁发或已 DELETE 时为 null。
                      **永远不返回原文**，原文仅在 POST 颁发 / 重生成接口响应里返回一次。
        '401':
          description: MINUS_AI_SID Cookie 缺失、过期或无效，需重新登录
