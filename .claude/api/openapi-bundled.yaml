          content:
            application/json:
              schema:
                type: object
                required: &ref_5
                  - apiKey
                  - prefix
                properties: &ref_6
                  apiKey:
                    type: string
                    pattern: ^mdk_[0-9A-Za-z]{38,50}$
                    description: |
                      完整 API Key 原文（`mdk_` + 44 位 Base62），**仅此一次返回，请妥善保存**。
                      后续无法找回；丢失只能重新生成（user 自助 DELETE + POST，或 admin 强制 POST regenerate）。
                    example: mdk_5k8Zt7QhZ3kR9mVx2yNpEwAbCdEfGhIjKlMnOpQrStUv
                  prefix:
                    type: string
                    pattern: ^mdk_[0-9A-Za-z]{8}$
                    description: 前 12 字符，与 apiKey 对应。UI 展示 / 后续识别用
                    example: mdk_5k8Zt7Qh
        '401':
          description: MINUS_AI_SID Cookie 缺失、过期或无效，需重新登录
          content: *ref_4
        '403':
          description: 持 dev key 调本接口被拒（防止 key 泄漏后被用于轮换出新 key 锁死正主）
          content:
            application/json:
              schema:
                type: object
                required: *ref_0
                properties: *ref_1
              example:
                code: FORBIDDEN_AUTH_METHOD
                message: This endpoint requires browser session (no dev key)
        '404':
          description: user_developers 无对应行
          content:
            application/json:
              schema:
                type: object
                required: *ref_0
                properties: *ref_1
              example:
                code: NOT_DEVELOPER
        '409':
          description: 状态非 VERIFIED 或已有 key
          content:
            application/json:
              schema:
                type: object
                required: *ref_0
                properties: *ref_1
              examples:
                invalidStatus:
                  summary: 状态非 VERIFIED
                  value:
                    code: INVALID_DEVELOPER_STATUS
                    message: status must be VERIFIED
                keyExists:
                  summary: 已有 key
                  value:
                    code: KEY_EXISTS
                    message: api key already issued
                    delete first: null
    delete:
      tags:
        - Developer
      summary: 撤销当前 API Key
      description: |
        `DELETE /api/me/developer/api-key`

        UPDATE `user_developers` 清 `api_key_hash` / `api_key_prefix`；同步 `redisson.delete(gateway:dev:key:{hash})` 立即失效缓存。
        幂等：当前无 key 也返 204。

        **鉴权**：仅 cookie session。
      operationId: deleteMyApiKey
      security:
        - minusAiSid: []
      responses:
        '204':
          description: 撤销成功（或本来就无 key）
        '401':
          description: MINUS_AI_SID Cookie 缺失、过期或无效，需重新登录
          content: *ref_4
        '403':
          description: 持 dev key 调本接口被拒（与 POST 对称，dev key 不允许撤销自己）
          content:
            application/json:
              schema:
                type: object
                required: *ref_0
                properties: *ref_1
              example:
                code: FORBIDDEN_AUTH_METHOD
                message: This endpoint requires browser session (no dev key)
  /api/auth/dev-session:
    post:
      tags:
        - Developer
      summary: 浏览器调试：装入 dev key cookie
      description: |
        `POST /api/auth/dev-session`

        把 Developer API Key 作为 `MINUS_AI_SID` cookie 的 value 装入浏览器，让后续请求（含 302 redirect / form submit / iframe 等不便注 header 的场景）走 dev key 鉴权路径。
        Gateway `SessionAuthFilter` 按 `mdk_` 前缀分支识别 cookie value 类型，与真 session sid 互斥。

        URL 归在 `/api/auth/**` family（与 `login` / `register` / `password/reset` 同类——都是 authentication establishment 公开端点），自动继承软鉴权放行。

        **鉴权**：公开端点，凭 body 里的 `apiKey` 自证身份；不需要既有 cookie / header。

        Cookie 寿命默认 90 天（`auth.cookie.maxAgeDevKeySeconds`），HttpOnly + SameSite=Lax。撤销靠 admin/dev DELETE key + gateway hash 反查失效，不靠 cookie 过期。
      operationId: installDevSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - apiKey
              additionalProperties: false
              properties:
                apiKey:
                  type: string
                  pattern: ^mdk_[A-Za-z0-9]{30,80}$
                  description: 完整 Developer API Key 原文（`mdk_xxx`）
      responses:
        '204':
          description: '安装成功；`Set-Cookie: MINUS_AI_SID=mdk_xxx; HttpOnly; SameSite=Lax; Max-Age=7776000`'
        '400':
          description: 请求体缺失 / 格式错误
          content:
            application/json:
              schema:
                type: object
                required: *ref_0
                properties: *ref_1
              example:
                code: VALIDATION_ERROR
                message: Invalid API key format
        '401':
          description: key 无效（hash 找不到 / 资质非 VERIFIED / 用户非 active）
          content:
            application/json:
              schema:
                type: object
                required: *ref_0
                properties: *ref_1
              example:
                code: INVALID_DEVELOPER_KEY
                message: Invalid developer API key
  /api/admin/users/{userId}/developer:
    parameters:
      - in: path
        name: userId
        required: true
        schema:
          type: string
          pattern: ^usr_[0-9A-Za-z]{24}$
        description: 目标用户 ID
    patch:
      tags:
        - Developer
      summary: admin 一站式建档 / 改资质状态
      description: |
        `PATCH /api/admin/users/{userId}/developer`

        upsert 到 `user_developers`：
        - 行不存在 + `status=VERIFIED` → INSERT，**同事务生成 key**，`verified_at=now()`、`verified_by=adminUserId`
        - 行存在 + `VERIFIED` + 当前 `api_key_hash IS NULL` → UPDATE status，**同事务生成 key**（覆盖之前被 DELETE 的场景）
        - 行存在 + `VERIFIED` + 当前 `api_key_hash NOT NULL` → UPDATE status，**不动 key**
        - 改为 `SUSPENDED` / `REVOKED` → UPDATE status + `suspended_reason`；同步 `redisson.delete` 让现有 key 立即失效

        **鉴权**：admin 白名单。
