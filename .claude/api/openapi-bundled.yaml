openapi: 3.1.0
info:
  title: Web端 Rest API
  version: 1.0.0
  description: |
    ## 认证

    Web 端请求通过 Cookie `MINUS_AI_SID` 鉴权（**Spring Session + Redis**，opaque session token，非 JWT）。

    - 注册 / 登录成功后，平台 Set-Cookie 下发 `MINUS_AI_SID=<sessionId>`（HttpOnly、SameSite=Lax、prod 下 Secure）
    - 后续请求浏览器自动带 cookie，gateway 通过 `ReactiveSessionRepository.findById(sessionId)` 校验 → 命中后注入 `X-User-Id` + `X-Team-Id` 头给下游
    - session 默认 7 天滑动过期；登录时带 `rememberMe=true` 延长至 30 天
    - session 失效 / 不存在 → 业务接口返 `401 UNAUTHORIZED`；前端清状态跳登录页
    - `/api/auth/**` 与 `/oauth/**` 在 gateway 白名单内（不要求 session 即可访问）

    **第三方 skill 开发者本地调试场景**通过 OAuth 2.0 Authorization Code + PKCE 拿到 `MINUS_AI_SID`，详见 **OAuth** tag 下的两个端点。

    ### Developer API Key（Plugin / CLI / SDK / 浏览器调试 个人凭据）

    认证开发者用 Plugin / CLI / SDK 调平台 API 没有浏览器 cookie；浏览器调试场景下 302 redirect 又会丢失 header。由 admin 颁发个人凭据 **Developer API Key**（`mdk_xxx`），同时支持 header 和 cookie 两条等效入口。

    - **颁发方式**：1.0 由 admin 通过 `PATCH /api/admin/users/{userId}/developer` 一站式建档 + 同事务生成 key，admin 拿原文线下交给开发者（DB 仅存 SHA-256 哈希，原文丢失只能重新生成）
    - **使用方式**：两条等效入口（共享 `DeveloperKeyResolver`，最终注头一致）：
      - **Header**：`X-Developer-Api-Key: mdk_xxx` — CLI / Plugin / curl 等非浏览器场景，gateway `DeveloperApiKeyFilter` 命中
      - **Cookie**：`MINUS_AI_SID=mdk_xxx`（先调 `POST /api/auth/dev-session` 装入）— 浏览器调试，特别是 302 redirect / form submit / iframe 不便注 header 的场景。gateway `SessionAuthFilter` 按 `mdk_` 前缀分支识别，与真 session sid 互斥
    - **权限模型**：默认可调**所有非 admin 接口**，按 controller 内 ownership 校验自然限权。两类例外强制 cookie session，dev key（无论 header 还是 cookie 入口）调返 `403 FORBIDDEN_AUTH_METHOD`：
      - Admin 接口 `/api/admin/**` 全部 — 即使 user 在 admin 白名单也拒（PAT 模型核心，key 泄漏不能升级到平台沦陷）
      - 自轮换 / 改 profile：`POST/DELETE /api/me/developer/api-key`、`PATCH /api/me`
    - **资质变更即时失效**：admin 改 SUSPENDED / REVOKED 时 service 层主动清 Redis 缓存让旧 key 立即失效（不等 5 min TTL）
    - **跟 cookie session 关系**：header 与 cookie 同时携带时 `DeveloperApiKeyFilter`（Order=-150）先命中并短路 `SessionAuthFilter`，header 入口胜出（行为可预测）

    **手机号必绑约束**：邮箱注册的账户已登录但未绑手机号时，所有业务接口返 `403 PHONE_REQUIRED`；仅以下接口允许调用以完成绑定流程：`GET /api/me`（读自己状态，含 `phoneRequired` 字段）、`/api/auth/logout`、`/api/auth/identities/bind`、`/api/auth/vcode/send`（purpose=bind）、`/api/auth/password/change`。**Developer API Key 路径旁路本约束**（admin 已审核 VERIFIED，phone 状态无关）。注意 `PATCH /api/me`（改 profile）由 `AdminAuthorizer.requireSessionAuth` 强制 cookie session（与 phone 必绑约束无关，dev key 直接 `FORBIDDEN_AUTH_METHOD`）。
