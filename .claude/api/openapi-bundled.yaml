      security:
        - minusAiSid: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: &ref_53
                - status
              properties: &ref_54
                status:
                  type: string
                  enum:
                    - VERIFIED
                    - SUSPENDED
                    - REVOKED
                  description: 目标状态。不允许从外部传 `PENDING`（1.0 不走自助申请流程）
                  example: VERIFIED
                suspendedReason:
                  type: string
                  maxLength: 500
                  description: 改为 SUSPENDED / REVOKED 时建议填写原因，UI 给开发者看
      responses:
        '200':
          description: 改后的资质状态；新颁发了 key 时附带原文
          content:
            application/json:
              schema:
                type: object
                required: &ref_55
                  - userId
                  - status
                properties: &ref_56
                  userId:
                    type: string
                    pattern: ^usr_[0-9A-Za-z]{24}$
                    example: usr_5k8Zt7QhZ3kR9mVx2yNpEw
                  status:
                    type: string
                    enum:
                      - PENDING
                      - VERIFIED
                      - SUSPENDED
                      - REVOKED
                    description: 改后的资质状态
                    example: VERIFIED
                  apiKey:
                    type: string
                    pattern: ^mdk_[0-9A-Za-z]{38,50}$
                    description: |
                      **仅在该次调用新颁发了 key（INSERT 或恢复已 DELETE 的 key）时返回**，其他场景不返回。
                      原文仅此一次返回，admin 拿原文线下交给开发者
                  prefix:
                    type: string
                    pattern: ^mdk_[0-9A-Za-z]{8}$
                    description: 与 apiKey 对应；仅与 apiKey 同时返回
        '400':
          description: 请求参数错误，`code` 可为 `FILE_TOO_LARGE` / `UNSUPPORTED_FORMAT` / `VALIDATION_ERROR`
          content: *ref_2
        '401':
          description: MINUS_AI_SID Cookie 缺失、过期或无效，需重新登录
          content: *ref_4
        '403':
          description: 当前 user 不在 admin 白名单
          content:
            application/json:
              schema:
                type: object
                required: *ref_0
                properties: *ref_1
              example:
                code: FORBIDDEN
                message: admin privilege required
        '404':
          description: 目标 userId 不存在
          content:
            application/json:
              schema:
                type: object
                required: *ref_0
                properties: *ref_1
  /api/admin/users/{userId}/developer/api-key:
    parameters:
      - in: path
        name: userId
        required: true
        schema:
          type: string
          pattern: ^usr_[0-9A-Za-z]{24}$
