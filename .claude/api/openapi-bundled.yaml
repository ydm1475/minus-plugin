      summary: 绑定新 identity（手机或邮箱）
      description: |
        `POST /api/auth/identities/bind`

        消费验证码后，事务内 INSERT user_identities + UPDATE `users.primary_phone` 或 `primary_email`（按 channel）。**不自动切换 primary**：如果用户已绑了手机 A 又绑手机 B，A 仍是 primary，需走另一接口切换。

        **手机号未绑定的账户也允许调用**（这是绑手机本身的接口）。
      operationId: bindIdentity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: &ref_46
                - channel
                - target
                - code
              properties: &ref_47
                channel:
                  type: string
                  enum:
                    - phone
                    - email
                  description: 要绑定的 identity 通道
                  example: phone
                target:
                  type: string
                  description: 手机号（E.164） / 邮箱
                  example: '+8613800000000'
                code:
                  type: string
                  description: 6 位验证码（`POST /api/auth/vcode/send` 用 `purpose=bind` 取得）
                  example: '888888'
      responses:
        '204':
          description: 绑定成功
        '400':
          description: 请求参数错误，`code` 可为 `FILE_TOO_LARGE` / `UNSUPPORTED_FORMAT` / `VALIDATION_ERROR`
          content: *ref_2
        '401':
          description: MINUS_AI_SID Cookie 缺失、过期或无效，需重新登录
          content: *ref_4
        '409':
          description: 注册或绑定时手机号/邮箱已被其他账户占用（不暴露具体属于谁）
          content: *ref_7
