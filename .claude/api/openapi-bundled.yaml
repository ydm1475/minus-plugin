  /oauth/authorize:
    get:
      tags:
        - OAuth
      summary: OAuth 授权端点（颁发 authorization code）
      description: |
        `GET /oauth/authorize`

        第三方 skill SDK 后端检测到用户未登录 → 生成 `state` / `code_challenge` → 浏览器 302 跳来此 endpoint 启动授权流程。

        ## 实现效果

        1. 校验 `response_type=code`、`code_challenge_method=S256` 等参数合法性
        2. 校验 `client_id` 对应 `skills` 行存在且 `status='active'`（不合法 → 错误页 400）
        3. 校验 `redirect_uri` 命中白名单（不合法 → 错误页 400）
        4. 检查浏览器是否已登录（`MINUS_AI_SID` cookie + Spring Session 命中）
           - **未登录** → 302 到平台 SPA `/login?returnTo=<原 OAuth URL urlencode>`；SPA 登录组件检测到 `returnTo` 含 `/oauth/authorize` 时，登录成功后 `location.href = returnTo` 重新触发本端点
           - **已登录** → 生成高熵 `code` = `base64url(SecureRandom(32))`（43 字符），写 Redis `auth:code:{code}` 60s TTL，302 回 `redirect_uri` 带 `?code={code}&state={state}`

        ## Redis 副作用

        - `SETEX auth:code:{code} 60 <JSON>` — value 为：

        ```json
        {
          "clientId": "skl_xxx",
          "redirectUri": "http://localhost:3000/api/oauth/callback",
          "codeChallenge": "...",
          "codeChallengeMethod": "S256",
          "userId": "usr_xxx",
          "used": false,
          "expMs": 1747200000000
        }
        ```

        ## 鉴权

        未登录 302 跳登录页，登录后由 SPA 重新触发本端点；本端点自身不强制要求 session（但已登录态决定分支走向）。
      operationId: oauthAuthorize
      security: []
      parameters:
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum:
              - code
          description: 必须为 `code`，其他值返 `unsupported_response_type`
          example: code
        - name: client_id
          in: query
          required: true
          schema:
            type: string
          description: skill ID（= `skills.id`）
          example: skl_5k8Zt7QhZ3kR9mVx2yNpEw
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
            format: uri
          description: |
            SDK 回调 URL，必须命中白名单（`http://localhost(:\d+)?(/.*)?` 或 `https://*.minusai-dev.com(/.*)?`）。典型值：
            - 本机：`http://localhost:3000/api/oauth/callback`
            - dev 部署：`https://{host}.minusai-dev.com/skill/{skillId}/{version}/api/oauth/callback`
          example: http://localhost:3000/api/oauth/callback
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: SDK 生成的 CSRF token，平台原样回传 redirect query（不校验格式，建议 ≥ 16 字符高熵）
          example: 5k8Zt7QhZ3kR9mVx2yNpEw
        - name: code_challenge
          in: query
          required: true
          schema:
            type: string
            minLength: 43
            maxLength: 43
          description: '`base64url(sha256(code_verifier))`，43 字符（PKCE）'
          example: dBjftJeZ4CVP-mB92K27uhbUJU1p1r_wW1gFWFOEjXk
        - name: code_challenge_method
          in: query
          required: true
          schema:
            type: string
            enum:
              - S256
          description: 必须为 `S256`，其他值（含 `plain`）返 `invalid_request`
          example: S256
        - name: scope
          in: query
          required: false
          schema:
            type: string
          description: 1.0 忽略；保留字段以便未来扩展 scope / consent
      responses:
        '302':
          description: |
            重定向到 redirect_uri（已登录、校验通过）或平台 SPA `/login?returnTo=...`（未登录）。
            可 redirect 的错误（`unsupported_response_type` / `invalid_request` / `server_error`）也走此分支，
            URL 形如 `{redirect_uri}?error=...&error_description=...&state=...`。
          headers:
            Location:
              description: |
                典型值：
                - 已登录成功：`{redirect_uri}?code={code}&state={state}`
                - 未登录：`/login?returnTo=<原 OAuth URL urlencode>`
                - 可 redirect 错误：`{redirect_uri}?error=invalid_request&error_description=...&state=...`
              schema:
                type: string
                format: uri
        '400':
          description: |
            不可 redirect 的错误（直接渲染错误页 + HTTP 400，**禁止回跳 `redirect_uri`** 防任意跳转）：
            - `invalid_client` — `client_id` 不存在 / 对应 skill `status != active`
            - `invalid_request` — `redirect_uri` 缺失 / 不在白名单 / 格式不合法
          content:
            text/html:
              schema:
                type: string
                description: 平台渲染的错误页 HTML
  /oauth/token:
    post:
      tags:
        - OAuth
      summary: OAuth Token 端点（用 code 换 access_token）
      description: |
        `POST /oauth/token`

        SDK 后端在 `/api/oauth/callback` 收到平台回跳的 `code` 后，server-to-server 调本端点用 `code` + `client_secret` + `code_verifier` 换 `access_token`。

        Content-Type 仅接受 `application/x-www-form-urlencoded`；**不**接受 JSON、**不**支持 HTTP Basic Auth（按 dev-experience.md §8 简化决策）。

        ## 校验顺序（按 RFC 6749 §5.2 推荐顺序，**实现时必须严格按编号**）

        1. `grant_type == "authorization_code"` → 否则 `400 unsupported_grant_type`
        2. 所有必填字段非空 + 基本格式 → 否则 `400 invalid_request`
        3. `GET auth:code:{code}` 命中 + value 中 `used == false` + `expMs > now` → 否则 `400 invalid_grant`
        4. value.`clientId == client_id` → 否则 `400 invalid_grant`（**注意：用 invalid_grant 而非 invalid_client，避免泄露"code 是为另一 client 颁发"的元信息**）
        5. value.`redirectUri == redirect_uri` → 否则 `400 invalid_grant`
        6. `skills` 表反查 `id = client_id AND api_key = client_secret AND status = 'active'` → 否则 `401 invalid_client`
        7. `base64url(sha256(code_verifier)) == value.codeChallenge` → 否则 `400 invalid_grant`
        8. 全过 → `DEL auth:code:{code}`、加载用户 Spring Session sid、返回 200

        ## Redis 副作用

        - `GET auth:code:{code}` — 取 code 绑定的 metadata
        - `DEL auth:code:{code}` — **所有校验通过后**才删（一次性消费、防重放）

        ## 鉴权

        通过 form body 的 `client_id` + `client_secret` 校验；不要求 cookie / session。
      operationId: oauthToken
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: &ref_112
                - grant_type
                - code
                - redirect_uri
                - client_id
                - client_secret
                - code_verifier
              description: |
                `POST /oauth/token` 的 form body（`application/x-www-form-urlencoded`）。
                字段名遵循 RFC 6749 snake_case 命名（**与本文档其他接口的 camelCase 不同**）。
              properties: &ref_113
                grant_type:
                  type: string
                  enum:
                    - authorization_code
                  description: 必须为 `authorization_code`，其他值返 `unsupported_grant_type`
                  example: authorization_code
                code:
                  type: string
                  description: '`/oauth/authorize` 颁发的一次性 auth code，60s 内一次有效'
                  example: dBjftJeZ4CVP-mB92K27uhbUJU1p1r_wW1gFWFOEjXk
                redirect_uri:
                  type: string
                  format: uri
                  description: 必须与 `/oauth/authorize` 时传的 `redirect_uri` 完全一致（防 redirect URI 替换攻击）
                  example: http://localhost:3000/api/oauth/callback
                client_id:
                  type: string
                  description: skill ID（= `skills.id`）
                  example: skl_5k8Zt7QhZ3kR9mVx2yNpEw
                client_secret:
                  type: string
                  description: skill API key（= `skills.api_key`）；来自开发者本地 `.env`，**永不进浏览器**
                  example: ska_5k8Zt7QhZ3kR9mVx2yNpEw
                code_verifier:
                  type: string
                  minLength: 43
                  maxLength: 128
                  description: PKCE 原文 verifier；平台 `sha256` 后必须等于 `/oauth/authorize` 时绑定的 `code_challenge`
                  example: dBjftJeZ4CVP-mB92K27uhbUJU1p1r_wW1gFWFOEjXk-dBjftJeZ4CVP-mB92K27uhbUJU1
      responses:
        '200':
          description: |
            授权成功，返回 access_token（= 当前用户的 Spring Session sid，复用现有 session，不发新 session）。
            SDK 拿到后写入本机域 cookie `MINUS_AI_SID`，后续业务调用浏览器自动带 cookie。
          content:
            application/json:
              schema:
                type: object
                required: &ref_114
                  - access_token
                  - token_type
                  - expires_in
                  - scope
                description: |
                  `POST /oauth/token` 200 响应（`application/json`），按 [RFC 6749 §5.1](https://datatracker.ietf.org/doc/html/rfc6749#section-5.1)。
                  字段名遵循 OAuth snake_case 命名。
                  **故意不返** `refresh_token`（1.0 简化：session 过期 SDK 重走 OAuth flow）和 OIDC `id_token`（1.0 不上 OIDC，user info 走 `GET /api/me`）。
                properties: &ref_115
                  access_token:
                    type: string
                    description: Spring Session sid，**与 `MINUS_AI_SID` cookie 值完全相同**。SDK 拿到后写入本机域 cookie，后续业务调用浏览器自动带 cookie
                    example: spring_sid_xxxxxxx
                  token_type:
                    type: string
                    enum:
                      - session
                    description: |
                      固定 `session`（**非标 OAuth Bearer**）。此字段刻意非标——SDK 拿到 sid 必须以 **HttpOnly cookie** 形式提供给浏览器、由 gateway `SessionAuthFilter` 解 cookie 鉴权，**不能塞 `Authorization: Bearer` 头**（gateway 没有 bearer 鉴权路径）；用 `session` 字面值让 SDK 一眼识别"这是 cookie token、非 bearer"
                    example: session
                  expires_in:
                    type: integer
                    minimum: 0
                    description: |
                      当前 session 实际剩余 TTL（秒）：默认 7 天 session 颁发时为 `604800`；`rememberMe=true` 颁发的 session 为 `2592000`；
                      **不是新发** TTL，是从 Spring Session repository 读出来的剩余值（用户已用一段时间则相应缩短）
                    example: 604800
                  scope:
                    type: string
                    description: 1.0 固定空串 `""`，保留字段以便未来扩展
                    example: ''
        '400':
          description: |
            `invalid_request` / `unsupported_grant_type` / `invalid_grant`
            （`error` 字段标识具体类型，详见 OAuth tag 错误码表）
          content:
            application/json:
              schema:
                type: object
                required: &ref_24
                  - error
                description: |
                  OAuth 错误响应（[RFC 6749 §5.2](https://datatracker.ietf.org/doc/html/rfc6749#section-5.2)），格式 `{ error, error_description, error_uri }`。
                  **与项目其他接口的 ErrorResponse 不同**——OAuth endpoint 唯一例外，让标准 OAuth client lib 开箱兼容。
                properties: &ref_25
                  error:
                    type: string
                    enum:
                      - invalid_request
                      - invalid_client
                      - invalid_grant
                      - unsupported_grant_type
                      - unsupported_response_type
                      - server_error
                    description: |
                      标准 OAuth 错误码（全小写 snake_case）：
                      - `invalid_request` (400) — 缺必填参数 / 参数格式错
                      - `invalid_client` (401) — client_id 不存在 / client_secret 不匹配 / skill status != active
                      - `invalid_grant` (400) — code 不存在 / 过期 / 已消费 / redirect_uri 不一致 / PKCE 校验失败
                      - `unsupported_grant_type` (400) — grant_type 非 authorization_code
                      - `unsupported_response_type` (400) — response_type 非 code
                      - `server_error` (500) — 内部错误
                    example: invalid_grant
                  error_description:
                    type: string
                    description: 人类可读的错误描述
                    example: authorization code has expired or already been used
                  error_uri:
                    type: string
                    format: uri
                    description: 进一步说明此错误的文档 URL（1.0 不发；保留字段以便未来 OIDC 扩展）
              examples:
                invalid_grant:
                  summary: code 已过期或已消费
                  value:
                    error: invalid_grant
                    error_description: authorization code has expired or already been used
                invalid_request:
                  summary: 缺必填参数
                  value:
                    error: invalid_request
                    error_description: missing required parameter code_verifier
                unsupported_grant_type:
                  summary: grant_type 非 authorization_code
                  value:
                    error: unsupported_grant_type
                    error_description: only 'authorization_code' is supported
        '401':
          description: client_id 不存在 / client_secret 不匹配 / skill status != active
          content:
            application/json:
              schema:
                type: object
                required: *ref_24
                description: |
                  OAuth 错误响应（[RFC 6749 §5.2](https://datatracker.ietf.org/doc/html/rfc6749#section-5.2)），格式 `{ error, error_description, error_uri }`。
                  **与项目其他接口的 ErrorResponse 不同**——OAuth endpoint 唯一例外，让标准 OAuth client lib 开箱兼容。
                properties: *ref_25
              example:
                error: invalid_client
                error_description: client authentication failed
        '500':
          description: 内部错误（Redis 异常等基础设施问题）
          content:
            application/json:
              schema:
                type: object
                required: *ref_24
                description: |
                  OAuth 错误响应（[RFC 6749 §5.2](https://datatracker.ietf.org/doc/html/rfc6749#section-5.2)），格式 `{ error, error_description, error_uri }`。
                  **与项目其他接口的 ErrorResponse 不同**——OAuth endpoint 唯一例外，让标准 OAuth client lib 开箱兼容。
                properties: *ref_25
              example:
                error: server_error
                error_description: internal server error
components:
  securitySchemes:
    minusAiSid:
      type: apiKey
      in: cookie
      name: MINUS_AI_SID
      description: |
        Spring Session opaque token，存储在 `HttpOnly; SameSite=Lax`（prod 加 `Secure`）Cookie 中，
        key 为 `MINUS_AI_SID`。注册 / 登录成功后由 platform 写入 Redis（`spring:session:*` keyspace）并
        Set-Cookie 下发；后续请求浏览器自动带，gateway `SessionAuthFilter` 通过
        `ReactiveSessionRepository.findById` 校验后注入 `X-User-Id` / `X-Team-Id` 头给下游。

        - **Web 端**：浏览器自动管理 cookie；前端 JS 不可读（HttpOnly）
        - **Skill 端**：Skill 容器从用户浏览器请求中带 cookie，调 `/skill-api/**` 时透传

        Session 默认 7 天滑动过期；登录传 `rememberMe=true` 延长至 30 天。详见
        [docs/1.0/architecture.md §7](../../../../docs/1.0/architecture.md)。
    developerApiKey:
      type: apiKey
      in: header
      name: X-Developer-Api-Key
      description: |
        Developer API Key（格式 `mdk_xxx`），用于 Plugin / CLI / SDK 代表开发者本人调平台 API，
        替代浏览器 cookie session。DB 仅存 SHA-256 哈希（`user_developers.api_key_hash`），原文仅在颁发 /
        重生成响应里返回一次。

        **颁发条件**：`user_developers.status='VERIFIED'`。1.0 阶段 admin 通过
        `PATCH /api/admin/users/{userId}/developer` 一站式建档 + 同事务生成 key 后线下交给开发者。

        **鉴权链路**：gateway `DeveloperApiKeyFilter`（Order=-150，放 SessionAuth 之前）SHA-256 反查
        user_developers → 校验 user.status='active' ∧ user_developers.status='VERIFIED' →
        注入 `X-User-Id` + `X-Auth-Method=developer_api_key` → 设置 `authResolved=true`
        短路 SessionAuth。Redis 缓存 `gateway:dev:key:{hash}` TTL 5 min；
        admin SUSPEND / REVOKE / DELETE / 重生成时主动 redisson.delete 让旧 key 立即失效。

        **scope 固定**：仅 6 个白名单接口（GET `/api/me`、GET `/api/skill-tags`、
        GET `/api/me/skills/{skillId}`、POST `/api/skills`、PATCH `/api/skills/{skillId}`、
        POST `/api/skills/{skillId}/versions`）；调非白名单接口返 403 `FORBIDDEN_AUTH_METHOD`。

        详见 [docs/1.0/dev-mode-design-draft.md](../../../../docs/1.0/dev-mode-design-draft.md)
        与 §1.5 Developer 资质与 API Key。
