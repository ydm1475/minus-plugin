                type: object
                required: *ref_0
                properties: *ref_1
              example:
                code: INVALID_DEVELOPER_STATUS
  /api/auth/password/change:
    post:
      tags:
        - Auth
      summary: 修改密码
      description: |
        `POST /api/auth/password/change`

        校验旧密码后更新 `users.password_hash`，**强制下线该用户所有设备**（清空 `auth:user:sessions:{userId}` Set 中的所有 sessionId）。当前发起请求的 session 也会被清，用户需重新登录。手机号未绑定的账户也允许调用。
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: &ref_42
                - oldPassword
                - newPassword
              properties: &ref_43
                oldPassword:
                  type: string
                  description: 旧密码明文。如 `users.password_hash=NULL`（仅验证码注册账户）则必须传空字符串，否则返 400
                  example: Qwer1234
                newPassword:
                  type: string
                  minLength: 8
                  description: 新密码明文，最小长度 8
                  example: NewPass5678
      responses:
        '204':
          description: |
            修改成功；响应 header 含 `Set-Cookie MINUS_AI_SID=` 与 `Max-Age=0`，前端需重定向到登录页
          headers:
            Set-Cookie:
              description: 当前 session 已清
              schema:
                type: string
                example: MINUS_AI_SID=; Path=/; Max-Age=0
        '400':
          description: 请求参数错误，`code` 可为 `FILE_TOO_LARGE` / `UNSUPPORTED_FORMAT` / `VALIDATION_ERROR`
          content: *ref_2
        '401':
          description: 旧密码错误（`PASSWORD_INCORRECT`）或无 session（`UNAUTHORIZED`）
          content:
            application/json:
              schema:
                type: object
                required: *ref_0
                properties: *ref_1
              example:
                code: PASSWORD_INCORRECT
                message: Old password is incorrect
  /api/auth/password/reset:
    post:
      tags:
        - Auth
      summary: 重置密码（未登录用户）
      description: |
        `POST /api/auth/password/reset`

        未登录用户忘记密码自助重置：消费验证码（purpose=reset）→ 反查 user → 更新 password_hash → **强制下线该用户全部设备**。重置成功后调用 `/api/auth/login` 用新密码建立新 session。

        **公开接口**（无需 session）。
      operationId: resetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: &ref_44
                - channel
                - target
                - code
                - newPassword
              properties: &ref_45
                channel:
                  type: string
                  enum:
                    - phone
                    - email
                  description: 通道
                  example: phone
                target:
                  type: string
                  description: 手机号（E.164）/ 邮箱
                  example: '+8613800000000'
                code:
                  type: string
                  description: 6 位验证码（`vcode/send` purpose=reset 取得）
                  example: '888888'
                newPassword:
                  type: string
                  minLength: 8
                  description: 新密码明文，8-72 字符
                  example: NewPass5678
      responses:
        '204':
          description: 重置成功（同账户全部活跃 session 被强制下线，需重新登录）
        '400':
          description: 请求参数错误，`code` 可为 `FILE_TOO_LARGE` / `UNSUPPORTED_FORMAT` / `VALIDATION_ERROR`
          content: *ref_2
        '403':
          description: 账户被封停 / 暂停，无法重置密码
          content:
            application/json:
              schema:
                type: object
                required: *ref_0
                properties: *ref_1
              example:
                code: FORBIDDEN
                message: Account is banned
        '404':
          description: identifier 未注册（`IDENTITY_NOT_FOUND`）。注：`vcode/send` 不暴露注册状态（仍返 204），仅本接口在确认重置时才返回此错误
          content:
            application/json:
              schema:
                type: object
                required: *ref_0
                properties: *ref_1
              example:
                code: IDENTITY_NOT_FOUND
                message: No account registered with this identifier
  /api/auth/identities/bind:
    post:
      tags:
