# 环境矩阵测试：在真实 Windows / macOS runner 上验证插件的环境适配链路
# （resolve-node.sh / launch.cjs / bootstrap-env.sh 真实 Volta 安装 / install.sh 插件识别）。
# Node 状态（无 node / 老 node / Volta / nvm / PATH 错序）由 tests/env-matrix 在 job 内
# 用受控 PATH + 假 HOME 构造，不按 Node 版本拆 job。详见 tests/env-matrix/lib.sh 头注释。
name: env-matrix

# 任意分支 push 都触发：这个 GitHub 仓库是纯 CI 载体（主仓库在 codeup），
# 开发者平时在特性分支工作，推上来就该跑矩阵验证，不必等并入 master
on:
  push:
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash   # Windows 上即 Git Bash，与插件脚本的 MSYS 假设一致
    env:
      MINUS_MIRROR: off   # CI 在海外，走官方源；镜像落盘逻辑由场景 08 显式验证
    steps:
      - uses: actions/checkout@v6

      # 老 node（18 < NODE_RUNTIME_FLOOR=20）：供场景用「不达标的解释器」跑 launch.cjs，
      # 验证其候选链与失败路径（execPath 第一位，新 node 跑它会自荐、测不到）
      - uses: actions/setup-node@v6
        with:
          node-version: 18
      - name: Capture old node path
        run: |
          p="$(node -p 'process.execPath')"
          command -v cygpath >/dev/null 2>&1 && p="$(cygpath -u "$p")"
          echo "MATRIX_OLD_NODE=$p" >> "$GITHUB_ENV"

      # 主 node（24 = NODE_TARGET）：跑测试本身 + npm 装 claude CLI
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Claude Code CLI（层 2 前置）
        run: npm install -g @anthropic-ai/claude-code

      # create-skill 用 npm 发布包（兄弟仓库 minus-platform 不在 GitHub，CI 拉不到源码）。
      # 装上后 integration 的 Flow 6/7（MCP ↔ create-skill 凭证共享契约）在 CI 也有覆盖；
      # 若发布版落后源码导致断言失败，属于「该发包了」的信号而非测试问题。
      - name: Install create-skill CLI（Flow 6/7 跨工具契约测试）
        run: npm install -g @minus-ai/create-skill

      - name: Run env matrix (ci scope)
        run: bash tests/env-matrix/run.sh --scope ci

      # 主测试套件 × 老 node 遮挡：把不达标的 node（18 < NODE_RUNTIME_FLOOR）放
      # PATH 首位再跑全量套件，复现用户机「/usr/local/bin/node v12 遮挡新 node」的
      # 真实形态（实测 2026-06-11）。套件含老 node 不变量（全部裸 node 脚本经
      # minus-lib smoke）与脏环境 e2e；resolve-node 须绕过 PATH 首位污染、从
      # runner 预装的系统绝对路径（mac /usr/local|homebrew，win ProgramFiles）找到合规 node。
      - name: Run full test suite (old node shadowing PATH)
        run: |
          SHIM="$RUNNER_TEMP/oldnode-shim"
          mkdir -p "$SHIM"
          if [ "$RUNNER_OS" = "Windows" ]; then
            cp "$MATRIX_OLD_NODE" "$SHIM/node.exe"
          else
            ln -sf "$MATRIX_OLD_NODE" "$SHIM/node"
          fi
          export PATH="$SHIM:$PATH"
          echo "PATH 首位 node: $(node -v)（应为 v18，被各脚本拒用）"
          bash tests/run-all.sh

      # install.ps1 引导薄壳的运行时验证（仅 Windows）：场景 09 已用 bash 装过插件，
      # 这里验证 ps1 的 Git Bash 探测 + 委托 install.sh 的幂等重入路径真实可跑。
      - name: Run install.ps1 (Windows bootstrap shell)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & powershell -ExecutionPolicy Bypass -File plugins/claude/minus-creator/install.ps1
          if ($LASTEXITCODE -ne 0) { throw "install.ps1 failed with exit code $LASTEXITCODE" }
